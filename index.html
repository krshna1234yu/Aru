<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>✨ Aru's Royal Gallery | 127 Beautiful Memories ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Royal Welcome Banner */
        .royal-welcome {
            background: linear-gradient(135deg, rgba(255,215,0,0.95) 0%, rgba(255,105,180,0.95) 100%);
            border-radius: 50px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
            animation: royalGlow 2s infinite;
        }

        @keyframes royalGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 30px rgba(255,215,0,0.8); }
        }

        .royal-welcome h1 {
            font-size: 2rem;
            color: #4a1a2e;
            margin-bottom: 10px;
        }

        .royal-welcome .queen-title {
            font-size: 1.3rem;
            color: #ffd700;
            background: rgba(74,26,46,0.8);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            margin: 10px 0;
        }

        .royal-welcome .gift-message {
            font-size: 1rem;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 50px;
            margin-top: 10px;
        }

        .crown-icon {
            font-size: 2.5rem;
            display: inline-block;
            animation: crownSpin 3s ease infinite;
        }

        @keyframes crownSpin {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2rem;
        }

        .header p {
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Theme Selector */
        .theme-selector {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .theme-selector label {
            color: white;
            font-size: 1.2rem;
            margin-right: 15px;
            font-weight: bold;
        }

        .theme-dropdown {
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
            min-width: 200px;
        }

        .count-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            background: #667eea;
            color: white;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .theme-frame {
            transition: all 0.4s ease;
            animation: fadeInUp 0.5s;
            position: relative;
            background: #fff5e6;
            border: 3px solid #ff69b4;
            border-radius: 50px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .theme-frame:hover {
            transform: translateY(-5px);
        }

        .frame-corner {
            position: absolute;
            font-size: 28px;
        }

        .corner-tl { top: -8px; left: -5px; }
        .corner-tr { top: -8px; right: -5px; }
        .corner-bl { bottom: -8px; left: -5px; }
        .corner-br { bottom: -8px; right: -5px; }

        .media-container {
            overflow: hidden;
            cursor: pointer;
            border-radius: 40px;
            position: relative;
        }

        .media-container img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
            border-radius: 35px;
        }

        .media-container:hover img {
            transform: scale(1.05);
        }

        .media-info {
            padding: 12px;
            text-align: center;
        }

        .media-name {
            font-size: 12px;
            margin-bottom: 10px;
            word-break: break-all;
            color: #c2185b;
        }

        .download-btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            cursor: pointer;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #ffd700;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .media-container img { height: 220px; }
            .royal-welcome h1 { font-size: 1.3rem; }
            .theme-selector label { display: block; margin-bottom: 10px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Scroll to top button */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ffd700;
            color: #4a1a2e;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .scroll-top:hover {
            transform: scale(1.1);
            background: #ff69b4;
            color: white;
        }
    </style>
</head>

        // Generate all 127 image names from 0001 to 0127
        for (let i = 29; i <= 127; i++) {
    if ((i >= 29 && i <= 49) || (i >= 58 && i <= 127)) {
        let number = i.toString().padStart(4, '0');
        imageFiles.push(`IMG-20260613-WA${number}.jpg`);
    }
        }
        const mediaItems = [];

        let currentTheme = 'flower';

        function applyTheme(themeKey) {
            currentTheme = themeKey;
            const theme = themes[themeKey];
            document.body.style.background = theme.bg;
            document.getElementById('themeTitle').innerHTML = theme.name + " Royal Gallery 👑";
            document.getElementById('themeSubtitle').innerHTML = `✨ ${theme.name} Theme - ${mediaItems.length} beautiful memories ✨`;
            document.getElementById('themeDropdown').value = themeKey;
            renderGallery();
        }

        window.downloadMedia = function(src, name) {
            const link = document.createElement('a');
            link.href = src;
            link.download = name;
            link.click();
        };

        window.openModal = function(src) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `<img src="${src}" style="max-width: 90vw; max-height: 90vh; border-radius: 10px;">`;
            modal.style.display = 'block';
        };

        function renderGallery() {
            const theme = themes[currentTheme];
            const gallery = document.getElementById('gallery');
            
            document.getElementById('mediaCount').innerHTML = `👑 📸 ${mediaItems.length} Beautiful Memories 👑`;
            
            gallery.innerHTML = mediaItems.map(item => `
                <div class="theme-frame" style="background: ${theme.frameBg}; border: ${theme.border}; border-radius: ${theme.borderRadius};">
                    <div class="frame-corner corner-tl">${theme.corner1}</div>
                    <div class="frame-corner corner-tr">${theme.corner2}</div>
                    <div class="frame-corner corner-bl">${theme.corner3}</div>
                    <div class="frame-corner corner-br">${theme.corner4}</div>
                    <div class="media-container" style="border-radius: ${parseInt(theme.borderRadius) - 10}px;">
                        <img src="${item.src}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Found'" onclick="openModal('${item.src}')">
                    </div>
                    <div class="media-info">
                        <div class="media-name" style="color: ${theme.textColor};">📷 ${item.name}</div>
                        <button class="download-btn" style="background: ${theme.btnColor};" onclick="downloadMedia('${item.src}', '${item.name}')">
                            ⬇️ Download
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Theme dropdown
        document.getElementById('themeDropdown').addEventListener('change', function(e) { 
            applyTheme(e.target.value); 
        });
        
        // Modal close
        const modal = document.getElementById('modal');
        const closeModal = document.querySelector('.close');
        closeModal.onclick = () => modal.style.display = 'none';
        modal.onclick = () => modal.style.display = 'none';

        // Initialize
        applyTheme('flower');
        
        console.log(`✅ Loaded ${mediaItems.length} images successfully!`);
        console.log(`Images from: ${imageFiles[0]} to ${imageFiles[imageFiles.length-1]}`);
    </script>
</body>
</html>
